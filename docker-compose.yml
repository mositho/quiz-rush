x-postgres-common: &postgres-common
    image: postgres:18-alpine
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
        interval: 5s
        timeout: 5s
        retries: 10

services:
    game-postgres:
        <<: *postgres-common
        container_name: quiz-rush-game-postgres
        environment:
            POSTGRES_DB: quiz_rush_game
            POSTGRES_USER: quiz_rush_game
            POSTGRES_PASSWORD: ${GAME_POSTGRES_PASSWORD:-quiz_rush_game}
        ports:
            - "${GAME_POSTGRES_HOST_PORT:-5433}:5432"
        volumes:
            - game_postgres_data:/var/lib/postgresql/data

    keycloak-postgres:
        <<: *postgres-common
        container_name: quiz-rush-keycloak-postgres
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
        volumes:
            - keycloak_postgres_data:/var/lib/postgresql/data

    questions-backend:
        image: golang:1.25
        container_name: quiz-rush-questions-backend
        working_dir: /app
        volumes:
            - ./questions-backend:/app
        command: go run ./cmd/server
        environment:
            PORT: "${QUESTIONS_BACKEND_PORT:-8080}"
            CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN-}"
        ports:
            - "${QUESTIONS_BACKEND_HOST_PORT:-8081}:${QUESTIONS_BACKEND_PORT:-8080}"

    keycloak:
        image: quay.io/keycloak/keycloak:26.2
        container_name: quiz-rush-keycloak
        command: ["start-dev", "--import-realm"]
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
            KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
            KC_HTTP_ENABLED: "true"
            KC_HTTP_RELATIVE_PATH: /account
            KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
            KC_HOSTNAME_STRICT: "false"
            KC_PROXY_HEADERS: xforwarded
        volumes:
            - ./keycloak:/opt/keycloak/data/import:ro
        depends_on:
            keycloak-postgres:
                condition: service_healthy

    game-backend:
        image: golang:1.25
        container_name: quiz-rush-game-backend
        restart: on-failure
        working_dir: /app
        environment:
            DATABASE_URL: postgres://quiz_rush_game:${GAME_POSTGRES_PASSWORD:-quiz_rush_game}@game-postgres:5432/quiz_rush_game?sslmode=disable
            PORT: "${GAME_BACKEND_PORT:-8080}"
            CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN-}"
            QUESTIONS_API_BASE_URL: ${QUESTIONS_API_BASE_URL:-http://questions-backend:8080}
            KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://localhost/account/realms/quiz-rush}
            KEYCLOAK_INTERNAL_ISSUER_URL: ${KEYCLOAK_INTERNAL_ISSUER_URL:-http://keycloak:8080/account/realms/quiz-rush}
            KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-quiz-rush-app}
        volumes:
            - ./game-backend:/app
        command: go run ./cmd/server
        ports:
            - "${GAME_BACKEND_HOST_PORT:-8080}:${GAME_BACKEND_PORT:-8080}"
        depends_on:
            game-postgres:
                condition: service_healthy
            questions-backend:
                condition: service_started
            keycloak:
                condition: service_started

    frontend:
        container_name: quiz-rush-frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
                VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost/account}
                VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-quiz-rush}
                VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-quiz-rush-app}
        ports:
            - "80:80"
        depends_on:
            game-backend:
                condition: service_started
            keycloak:
                condition: service_started

volumes:
    game_postgres_data:
    keycloak_postgres_data:
