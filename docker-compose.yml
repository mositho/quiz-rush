services:
  postgres:
    image: postgres:18
    container_name: quiz-rush-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: golang:1.25
    container_name: quiz-rush-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "go mod tidy && go run ./cmd/server"
    env_file:
      - backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    image: node:24
    container_name: quiz-rush-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    env_file:
      - frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
