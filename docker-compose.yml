services:
  postgres:
    image: postgres:18
    container_name: quiz-rush-postgres
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: golang:1.25
    container_name: quiz-rush-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: go run ./cmd/server
    env_file:
      - backend/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24
    container_name: quiz-rush-frontend
    working_dir: /app
    environment:
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    env_file:
      - frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_pnpm_store:
