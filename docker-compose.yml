services:
    postgres:
        image: postgres:18
        container_name: quiz-rush-postgres
        env_file:
            - .env
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 5s
            timeout: 5s
            retries: 10
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    backend:
        image: golang:1.25
        container_name: quiz-rush-backend
        working_dir: /app
        volumes:
            - ./backend:/app
        command: go run ./cmd/server
        env_file:
            - backend/.env
        ports:
            - "8080:8080"
        depends_on:
            postgres:
                condition: service_healthy

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: quiz-rush-frontend
        ports:
            - "5173:80"
        depends_on:
            backend:
                condition: service_started

volumes:
    postgres_data:
