services:
    keycloak-postgres:
        volumes: !reset
            - keycloak_postgres_data_dev:/var/lib/postgresql/data

    keycloak:
        environment:
            KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8082/account}
        ports:
            - "${KEYCLOAK_HOST_PORT:-8082}:8080"

    game-backend:
        environment:
            CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
            KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://localhost:8082/account/realms/quiz-rush}

    frontend:
        container_name: quiz-rush-frontend-dev
        build: !reset null
        image: node:24-alpine
        working_dir: /app
        command:
            - sh
            - -c
            - corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 5173
        environment:
            CHOKIDAR_USEPOLLING: "true"
            VITE_API_BASE_URL: http://localhost:${GAME_BACKEND_HOST_PORT:-8080}/api
            VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_HOST_PORT:-8082}/account
            VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-quiz-rush}
            VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-quiz-rush-app}
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules

volumes:
    frontend_node_modules:
    keycloak_postgres_data_dev:
