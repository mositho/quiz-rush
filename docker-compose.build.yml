services:
    questions-backend:
        image: ${QUESTIONS_BACKEND_IMAGE:-ghcr.io/mositho/quiz-rush-questions-backend}:${IMAGE_TAG:-latest}
        build:
            context: ./questions-backend
            dockerfile: Dockerfile

    game-backend:
        image: ${GAME_BACKEND_IMAGE:-ghcr.io/mositho/quiz-rush-game-backend}:${IMAGE_TAG:-latest}
        build:
            context: ./game-backend
            dockerfile: Dockerfile

    frontend:
        image: ${FRONTEND_IMAGE:-ghcr.io/mositho/quiz-rush-frontend}:${IMAGE_TAG:-latest}
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
                VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost/account}
                VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-quiz-rush}
                VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-quiz-rush-app}
