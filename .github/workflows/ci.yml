name: CI

on:
    push:
        paths:
            - "frontend/**"
            - "game-backend/**"
            - "questions-backend/**"
            - "docker-compose.yml"
            - "docker-compose.dev.yml"
            - "docker-compose.build.yml"
            - "docker-compose.coolify.yml"
            - ".github/workflows/ci.yml"
            - ".github/workflows/build-image.yml"
            - ".github/workflows/frontend-ci.yml"
            - ".github/workflows/game-backend-ci.yml"
            - ".github/workflows/questions-backend-ci.yml"
            - ".github/workflows/go-backend-reusable.yml"
    pull_request:
        paths:
            - "frontend/**"
            - "game-backend/**"
            - "questions-backend/**"
            - "docker-compose.yml"
            - "docker-compose.dev.yml"
            - "docker-compose.build.yml"
            - "docker-compose.coolify.yml"
            - ".github/workflows/ci.yml"
            - ".github/workflows/build-image.yml"
            - ".github/workflows/frontend-ci.yml"
            - ".github/workflows/game-backend-ci.yml"
            - ".github/workflows/questions-backend-ci.yml"
            - ".github/workflows/go-backend-reusable.yml"

permissions:
    contents: read

concurrency:
    group: ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend Checks
        uses: ./.github/workflows/frontend-ci.yml
        secrets: inherit

    game_backend:
        name: Game Backend Checks
        permissions:
            contents: read
            pull-requests: write
        uses: ./.github/workflows/game-backend-ci.yml
        secrets: inherit

    questions_backend:
        name: Questions Backend Checks
        permissions:
            contents: read
            pull-requests: write
        uses: ./.github/workflows/questions-backend-ci.yml
        secrets: inherit
