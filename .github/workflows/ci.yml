name: CI

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend Checks
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm lint

            - name: Run Prettier check
              run: pnpm format:check

            - name: Build frontend
              run: pnpm build

    go_backends:
        name: Go Backend Checks (${{ matrix.backend.name }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                backend:
                    - name: Questions Backend
                      dir: questions-backend
                    - name: Game Backend
                      dir: game-backend
        defaults:
            run:
                working-directory: ${{ matrix.backend.dir }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: ${{ matrix.backend.dir }}/go.mod
                  cache-dependency-path: ${{ matrix.backend.dir }}/go.sum

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  working-directory: ${{ matrix.backend.dir }}
                  args: --timeout=5m

            - name: Run tests
              run: go test -v ./...
