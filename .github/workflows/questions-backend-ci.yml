name: Questions Backend

on:
    push:
        paths:
            - "questions-backend/**"
            - ".github/workflows/questions-backend-ci.yml"
    pull_request:
        paths:
            - "questions-backend/**"
            - ".github/workflows/questions-backend-ci.yml"

permissions:
    contents: read

concurrency:
    group: questions-backend-ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    questions_backend:
        name: Go Backend Checks (Questions Backend)
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        defaults:
            run:
                working-directory: questions-backend
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: questions-backend/go.mod
                  cache-dependency-path: questions-backend/go.sum

            - name: Verify gofmt
              shell: bash
              run: |
                  set -euo pipefail
                  unformatted=$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 -r gofmt -l)
                  if [[ -n "$unformatted" ]]; then
                    echo "The following files are not gofmt-formatted:"
                    echo "$unformatted"
                    exit 1
                  fi

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  working-directory: questions-backend
                  args: --timeout=5m

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

            - name: Run tests with coverage
              run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Generate coverage summary
              id: coverage
              run: |
                  TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $NF}')
                  echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
                  echo "## Questions Backend Coverage: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
                  go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"

            - name: Post coverage comment on PR
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const total = '${{ steps.coverage.outputs.total }}';
                      const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      const marker = '<!-- questions-backend-coverage -->';
                      const body = `${marker}\n## Questions Backend Coverage\n**Total: ${total}**\n\n[Full per-package report](${runUrl})`;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
