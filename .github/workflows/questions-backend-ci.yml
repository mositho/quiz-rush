name: Questions Backend

on:
    workflow_call:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: questions-backend-ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    questions_backend:
        name: Go Backend Checks (Questions Backend)
        uses: ./.github/workflows/go-backend-reusable.yml
        permissions:
            contents: read
            pull-requests: write
        with:
            backend_name: Questions Backend
            backend_path: questions-backend
            coverage_title: Questions Backend
            coverage_marker: questions-backend-coverage
        secrets: inherit
