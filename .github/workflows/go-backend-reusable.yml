name: Reusable Go Backend CI

on:
    workflow_call:
        inputs:
            backend_name:
                required: true
                type: string
            backend_path:
                required: true
                type: string
            coverage_title:
                required: true
                type: string
            coverage_marker:
                required: true
                type: string

jobs:
    checks:
        name: Go Backend Checks (${{ inputs.backend_name }})
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.backend_path }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: ${{ inputs.backend_path }}/go.mod
                  cache-dependency-path: ${{ inputs.backend_path }}/go.sum

            - name: Verify gofmt
              shell: bash
              run: |
                  set -euo pipefail
                  unformatted=$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 -r gofmt -l)
                  if [[ -n "$unformatted" ]]; then
                    echo "The following files are not gofmt-formatted:"
                    echo "$unformatted"
                    exit 1
                  fi

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  working-directory: ${{ inputs.backend_path }}
                  args: --timeout=5m

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

            - name: Run unit tests with coverage
              shell: bash
              run: |
                  set -euo pipefail
                  unit_packages=$(go list ./... | grep -Ev '/tests($|/)')
                  echo "Running unit test packages:"
                  echo "$unit_packages"
                  go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic $unit_packages

            - name: Run integration tests
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ ! -d tests ]]; then
                    echo "No tests directory found. Skipping integration tests."
                    exit 0
                  fi

                  echo "Running integration tests from ./tests/..."
                  go test -v -race -count=1 ./tests/...

            - name: Generate coverage summary
              id: coverage
              shell: bash
              run: |
                  TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $NF}')
                  echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
                  echo "## ${{ inputs.coverage_title }} Coverage: $TOTAL" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
                  go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"

            - name: Post coverage comment on PR
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const total = '${{ steps.coverage.outputs.total }}';
                      const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      const marker = '<!-- ${{ inputs.coverage_marker }} -->';
                      const body = `${marker}\n## ${{ inputs.coverage_title }} Coverage\n**Total: ${total}**\n\n[Full per-package report](${runUrl})`;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
